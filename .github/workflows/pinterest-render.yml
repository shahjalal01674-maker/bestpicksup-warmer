name: Pinterest Pin Render

# Renders pending Pinterest pins for bestpicksup.com. Cloudflare Workers Free
# tier 10ms CPU limit can't handle Satori + resvg image rendering, so we do
# it here in a GitHub Actions Node runner (~5-10s per pin) and upload PNGs
# to R2 via S3 API. Then we tell the pinterest-agent worker to publish via
# Pinterest API (worker holds the OAuth tokens).
#
# Budget: each run ~30-60 sec at 1-3 pins/run, every 30 min = ~60 min/day
# = ~1800 min/month — public-repo GH Actions tier is UNLIMITED.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: pinterest-render
  cancel-in-progress: false

jobs:
  render:
    name: Render + upload pending pins
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'pinterest-render/package.json'

      - name: Install dependencies
        working-directory: pinterest-render
        run: npm install --no-save

      - name: Render + publish
        working-directory: pinterest-render
        env:
          WORKER_URL: ${{ secrets.PINTEREST_WORKER_URL }}
          ADMIN_SECRET: ${{ secrets.PINTEREST_ADMIN_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node render.mjs
